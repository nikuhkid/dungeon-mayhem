<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dungeon Mayhem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HOME SCREEN -->
  <div id="screen-home" class="screen">
    <h1>Dungeon<br>Mayhem</h1>
    <div id="home-actions">
      <input type="text" id="player-name-input" placeholder="Your name" maxlength="20" />
      <button id="btn-create-room">Create Room</button>
      <div id="join-row">
        <input type="text" id="room-code-input" placeholder="XXXX" maxlength="4" />
        <button id="btn-join-room">Join</button>
      </div>
    </div>
    <div id="home-error" class="error-msg"></div>
  </div>

  <!-- LOBBY SCREEN -->
  <div id="screen-lobby" class="screen hidden">
    <h2>Lobby — <span id="lobby-code"></span></h2>
    <div id="lobby-players"></div>
    <div id="hero-select">
      <h3>Choose your hero</h3>
      <div id="hero-list"></div>
    </div>
    <div id="lobby-actions">
      <button id="btn-ready" disabled>Lock In</button>
      <button id="btn-start-game" class="hidden">Start Game</button>
      <button id="btn-add-bot" class="hidden secondary">+ Bot</button>
      <button id="btn-game-mode" class="hidden secondary">Classic</button>
    </div>
    <div id="lobby-status"></div>
  </div>

  <!-- HERO INFO MODAL -->
  <div id="hero-info-modal" class="hidden">
    <div id="hero-info-backdrop"></div>
    <div id="hero-info-content">
      <img id="hero-info-img" src="" alt="Hero Info" />
      <button id="btn-close-hero-info">Close</button>
    </div>
  </div>

  <!-- SHIELD PICK MODAL (Charm / Sneak Attack! / Mighty Toss) -->
  <div id="shield-pick-modal" class="hidden">
    <div id="shield-pick-backdrop"></div>
    <div id="shield-pick-content">
      <h3 id="shield-pick-title">Choose a shield card</h3>
      <div id="shield-pick-cards"></div>
    </div>
  </div>

  <!-- RECLAIM MODAL (Divine Inspiration) -->
  <div id="reclaim-modal" class="hidden">
    <div id="reclaim-backdrop"></div>
    <div id="reclaim-content">
      <h3>Divine Inspiration — Reclaim a card</h3>
      <div id="reclaim-cards"></div>
    </div>
  </div>

  <!-- ROLLING SCREEN -->
  <div id="screen-rolling" class="screen hidden">
    <h2>Rolling for Turn Order!</h2>
    <div id="d20-anim">
      <!--
        Orthographic top-down projection of a vertex-up icosahedron.
        Upper ring U0-U4  at r=46, angles 90°/162°/234°/306°/18° (math CCW).
        Lower ring L0-L4  at r=46, offset +36°: 126°/198°/270°/342°/54°.
        Outer silhouette = decagon U0 L4 U4 L3 U3 L2 U2 L1 U1 L0 (clockwise).
        Visible faces: 5 cap (T-Ui-Ui+1) + 5 belt type-B (Li, Ui+1, Li+1).
        Hidden faces drawn faint.
      -->
      <svg id="d20-svg" viewBox="0 0 100 100" width="130" height="130" xmlns="http://www.w3.org/2000/svg">
        <!-- outer decagon (die silhouette) -->
        <polygon points="50,4 77,12.8 93.8,35.8 93.8,64.2 77,87.2 50,96 23,87.2 6.2,64.2 6.2,35.8 23,12.8"
                 fill="#1a1535" stroke="#ffd700" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- 5 spokes: center T → upper ring U vertices -->
        <line x1="50"  y1="50" x2="50"   y2="4"    stroke="#ffd700" stroke-width="1.2" opacity="0.55"/>
        <line x1="50"  y1="50" x2="6.2"  y2="35.8" stroke="#ffd700" stroke-width="1.2" opacity="0.55"/>
        <line x1="50"  y1="50" x2="23"   y2="87.2" stroke="#ffd700" stroke-width="1.2" opacity="0.55"/>
        <line x1="50"  y1="50" x2="77"   y2="87.2" stroke="#ffd700" stroke-width="1.2" opacity="0.55"/>
        <line x1="50"  y1="50" x2="93.8" y2="35.8" stroke="#ffd700" stroke-width="1.2" opacity="0.55"/>
        <!-- inner pentagon U0-U1-U2-U3-U4 (cap face edges) -->
        <polygon points="50,4 6.2,35.8 23,87.2 77,87.2 93.8,35.8"
                 fill="none" stroke="#ffd700" stroke-width="1.2" opacity="0.55"/>
        <!-- type-B belt face edges: L_i → U_{i+1} -->
        <line x1="23"   y1="12.8" x2="6.2"  y2="35.8" stroke="#ffd700" stroke-width="1" opacity="0.45"/>
        <line x1="6.2"  y1="64.2" x2="23"   y2="87.2" stroke="#ffd700" stroke-width="1" opacity="0.45"/>
        <line x1="50"   y1="96"   x2="77"   y2="87.2" stroke="#ffd700" stroke-width="1" opacity="0.45"/>
        <line x1="93.8" y1="64.2" x2="93.8" y2="35.8" stroke="#ffd700" stroke-width="1" opacity="0.45"/>
        <line x1="77"   y1="12.8" x2="50"   y2="4"    stroke="#ffd700" stroke-width="1" opacity="0.45"/>
        <!-- type-A belt face edges: U_i → L_i (hidden, faint) -->
        <line x1="50"   y1="4"    x2="23"   y2="12.8" stroke="#ffd700" stroke-width="0.8" opacity="0.28"/>
        <line x1="6.2"  y1="35.8" x2="6.2"  y2="64.2" stroke="#ffd700" stroke-width="0.8" opacity="0.28"/>
        <line x1="23"   y1="87.2" x2="50"   y2="96"   stroke="#ffd700" stroke-width="0.8" opacity="0.28"/>
        <line x1="77"   y1="87.2" x2="93.8" y2="64.2" stroke="#ffd700" stroke-width="0.8" opacity="0.28"/>
        <line x1="93.8" y1="35.8" x2="77"   y2="12.8" stroke="#ffd700" stroke-width="0.8" opacity="0.28"/>
        <!-- backdrop so number reads over spoke intersections -->
        <circle cx="50" cy="50" r="13" fill="#1a1535"/>
        <!-- number -->
        <text x="50" y="50" text-anchor="middle" dominant-baseline="middle"
              fill="#ffd700" font-family="'Press Start 2P', monospace" font-size="13">20</text>
      </svg>
    </div>
    <div id="rolling-list"></div>
    <div id="rolling-order" class="hidden"></div>
  </div>

  <!-- GAME SCREEN -->
  <div id="screen-game" class="screen hidden">
    <div id="game-header">
      <div id="turn-indicator"></div>
      <div id="pickpocket-reveal" class="hidden">
        <span id="pickpocket-label">Pickpocketed: </span>
        <span id="pickpocket-card-name"></span>
        <span id="pickpocket-hint"></span>
      </div>
      <div id="target-prompt" class="hidden">
        <span>Select a target</span>
        <button id="btn-cancel-target" class="secondary">Cancel</button>
      </div>
    </div>
    <div id="pile-area">
      <div id="draw-pile-wrap">
        <div id="draw-pile"></div>
        <div class="pile-label">DECK</div>
      </div>
      <div id="discard-pile-wrap">
        <div id="discard-pile"></div>
        <div class="pile-label">DISCARD</div>
      </div>
    </div>
    <div id="opponents-area"></div>
    <div id="right-panel">
      <div id="action-log"><h4>Log</h4><div id="log-entries"></div></div>
      <div id="info-card"><img src="assets/heroes/infos.png" alt="Game Info" draggable="false"></div>
    </div>
    <div id="table-area" class="hidden"></div>
    <div id="self-panel">
      <div id="self-info"></div>
      <div id="hand-section">
        <div id="hand-area"></div>
        <div id="hand-actions">
          <div id="end-turn-countdown" class="hidden"></div>
          <span id="turn-hint"></span>
          <button id="btn-preview-toggle" class="secondary">zoom off</button>
        </div>
      </div>
    </div>
  </div>

  <!-- WIN SCREEN -->
  <div id="screen-win" class="screen hidden">
    <div id="win-crown">★</div>
    <h1>Victory!</h1>
    <div id="win-hero"></div>
    <div id="win-player"></div>
    <div id="final-standings"></div>
    <button id="btn-play-again">Play Again</button>
    <button id="btn-leave-room" class="secondary">Leave Room</button>
  </div>

  <div id="log-card-preview" class="hidden"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
